<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tideboard · US Market Live</title>
<meta name="viewport" content="width=1640" />
<link rel="icon" href="assets/favicon.svg" />
<link rel="stylesheet" href="assets/colors_and_type.css?v=4" />
<link rel="stylesheet" href="assets/components.css?v=4" />
<link rel="stylesheet" href="assets/app.css?v=4" />
<link rel="stylesheet" href="assets/stock.css?v=4" />
<script>
  /*EDITMODE-BEGIN*/
  window.TWEAKS = {
    "theme": "dark",
    "density": "comfortable",
    "showSidebar": true
  };
  /*EDITMODE-END*/
</script>
<style>body { margin: 0; }</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- 1. 데이터 시드 (US 종목 메타) -->
<script src="assets/stock-data-us.js"></script>
<!-- 2. 라이브 API 연동 (Yahoo Finance) -->
<script src="assets/stock-live.js"></script>

<script type="text/babel" src="assets/icons.jsx"></script>
<script type="text/babel" src="assets/stock-components.jsx"></script>
<script type="text/babel" src="assets/stock-v1.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [theme, setTheme] = useState(window.TWEAKS.theme);
  const [density, setDensity] = useState(window.TWEAKS.density);
  const [showSidebar, setShowSidebar] = useState(window.TWEAKS.showSidebar);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (p) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits: p }, '*');

  return (
    <>
      <window.LayoutA density={density} showSidebar={showSidebar} />

      {editMode && (
        <div className="tweaks-panel">
          <div className="t-title">Tweaks</div>
          <div className="t-group">
            <div className="t-label">Theme</div>
            <div className="t-row">
              <button className={'t-pill ' + (theme === 'light' ? 'is-active' : '')} onClick={() => { setTheme('light'); persist({ theme: 'light' }); }}>Light</button>
              <button className={'t-pill ' + (theme === 'dark' ? 'is-active' : '')} onClick={() => { setTheme('dark'); persist({ theme: 'dark' }); }}>Dark</button>
            </div>
          </div>
          <div className="t-group">
            <div className="t-label">Density</div>
            <div className="t-row">
              <button className={'t-pill ' + (density === 'comfortable' ? 'is-active' : '')} onClick={() => { setDensity('comfortable'); persist({ density: 'comfortable' }); }}>Comfortable</button>
              <button className={'t-pill ' + (density === 'compact' ? 'is-active' : '')} onClick={() => { setDensity('compact'); persist({ density: 'compact' }); }}>Compact</button>
            </div>
          </div>
          <div className="t-group">
            <div className="t-label">Sidebar</div>
            <div className="t-row">
              <button className={'t-pill ' + (showSidebar ? 'is-active' : '')} onClick={() => { setShowSidebar(true); persist({ showSidebar: true }); }}>On</button>
              <button className={'t-pill ' + (!showSidebar ? 'is-active' : '')} onClick={() => { setShowSidebar(false); persist({ showSidebar: false }); }}>Off</button>
            </div>
          </div>
        </div>
      )}

      <button className="floating-theme" onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} title="Toggle theme">
        <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={15} />
      </button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
